<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NeuroScan AI · Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg: #080c14;
      --surface: #0d1421;
      --surface2: #111827;
      --border: #1e2d45;
      --accent: #0ea5e9;
      --accent2: #38bdf8;
      --accent-glow: rgba(14,165,233,0.15);
      --text: #f0f6ff;
      --muted: #64748b;
      --success: #10b981;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(14,165,233,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(14,165,233,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
    }
    .bg-glow {
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(14,165,233,0.08) 0%, transparent 70%);
      top: -200px; left: -200px;
      z-index: 0;
      animation: float 8s ease-in-out infinite;
    }
    .bg-glow2 {
      position: fixed;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(56,189,248,0.06) 0%, transparent 70%);
      bottom: -100px; right: -100px;
      z-index: 0;
      animation: float 10s ease-in-out infinite reverse;
    }
    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(30px, 30px); }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      width: 420px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(14,165,233,0.05);
      animation: slideUp 0.5s ease forwards;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }
    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      color: white;
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .logo-text span { color: var(--accent); }

    /* Tabs */
    .tabs {
      display: flex;
      background: var(--bg);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 2rem;
    }
    .tab {
      flex: 1;
      padding: 0.6rem;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 500;
      border-radius: 7px;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.2s;
      border: none;
      background: transparent;
    }
    .tab.active {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    /* Form */
    .form-group { margin-bottom: 1.2rem; }
    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 0.4rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.85rem;
    }
    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 0.75rem 0.75rem 2.5rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    /* Button */
    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      border: none;
      border-radius: 10px;
      padding: 0.85rem;
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.5rem;
      letter-spacing: 0.02em;
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(14,165,233,0.3);
    }
    .btn-primary:active { transform: scale(0.98); }

    /* Flash messages */
    .flash {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1.2rem;
    }
    .flash.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .flash.success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }

    /* Divider */
    .divider {
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      margin: 1.5rem 0 0;
    }

    /* Panel toggle */
    .panel { display: none; }
    .panel.active { display: block; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="bg-glow2"></div>

  <div class="card">
    <div class="logo">
      <div class="logo-icon"><i class="fas fa-brain"></i></div>
      <div class="logo-text">Neuro<span>Scan</span> AI</div>
    </div>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login', this)">Sign In</button>
      <button class="tab" onclick="switchTab('register', this)">Register</button>
    </div>

    <!-- Login Panel -->
    <div id="login" class="panel active">
      <form method="POST" action="/login">
        <div class="form-group">
          <label>Email Address</label>
          <div class="input-wrap">
            <i class="fas fa-envelope"></i>
            <input type="email" name="email" placeholder="doctor@hospital.com" required>
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock"></i>
            <input type="password" name="password" placeholder="••••••••" required>
          </div>
        </div>
        <button type="submit" class="btn-primary">
          <i class="fas fa-sign-in-alt" style="margin-right:8px"></i> Sign In
        </button>
      </form>
    </div>

    <!-- Register Panel -->
    <div id="register" class="panel">
      <form method="POST" action="/register">
        <div class="form-group">
          <label>Full Name</label>
          <div class="input-wrap">
            <i class="fas fa-user"></i>
            <input type="text" name="name" placeholder="Dr. John Smith" required>
          </div>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <div class="input-wrap">
            <i class="fas fa-envelope"></i>
            <input type="email" name="email" placeholder="doctor@hospital.com" required>
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock"></i>
            <input type="password" name="password" placeholder="Min. 8 characters" required>
          </div>
        </div>
        <button type="submit" class="btn-primary">
          <i class="fas fa-user-plus" style="margin-right:8px"></i> Create Account
        </button>
      </form>
    </div>

    <div class="divider">NeuroScan AI · For Educational Use Only</div>
  </div>

  <script>
    function switchTab(panel, btn) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(panel).classList.add('active');
      btn.classList.add('active');
    }
  </script>
</body>
</html>
